version: 2

project_name: pgdesigner

before:
  hooks:
    - sh -c "cd frontend && pnpm install --frozen-lockfile && pnpm build"

builds:
  - main: ./cmd/pgdesigner
    binary: pgdesigner
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: >-
            {{- if eq .Os "darwin" }}
            quill sign-and-notarize "{{ .Path }}" --dry-run={{ .IsSnapshot }} --ad-hoc={{ .IsSnapshot }} -vv
            {{- else }}
            true
            {{- end }}
          env:
            - QUILL_LOG_FILE=/tmp/quill-{{ .Target }}.log
          output: true

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "pgdesigner-{{ .Os }}-{{ .Arch }}"

brews:
  - repository:
      owner: vmkteam
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://pgdesigner.io"
    description: "PostgreSQL schema designer — ERD, linting, diffing, sample data"
    license: "PolyForm-Noncommercial-1.0.0"
    test: |
      system "#{bin}/pgdesigner version"

dockers_v2:
  - images:
      - "ghcr.io/vmkteam/pgdesigner"
    tags:
      - "v{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    sbom: false
    flags:
      - "--provenance=false"

release:
  github:
    owner: vmkteam
    name: pgdesigner
